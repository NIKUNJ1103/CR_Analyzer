name: Build player pool

on:
  schedule:
    - cron: '0 3 * * *'   # once/day — the pool barely shifts hour to hour
  workflow_dispatch: {}

jobs:
  build_pool:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build/refresh player pool
        env:
          CR_API_KEY: ${{ secrets.CR_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TARGET_UNIQUE_PLAYERS: '2500'
        run: python pool_builder.py
